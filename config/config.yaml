# Resume Agent Configuration (Concise)
# Use config/config.local.yaml for machine-specific overrides.

# LLM
provider: "gemini"            # gemini | kimi | glm | deepseek | minimax
api_key: "${GEMINI_API_KEY}"  # Env var placeholder recommended
model: "gemini-3-pro-preview"

# Core runtime
max_steps: 20
max_tokens: 2048
# Optional fallback when the provider cannot expose model context metadata.
# context_window_override: 131072
temperature: 0.5
workspace_dir: "./workspace"

# Logging
log_level: "INFO"
log_file: "./logs/agent.log"

# Chrome DevTools Protocol (for LinkedIn job tools)
cdp:
  port: 0                # 0 = auto-detect free port via TS launcher; nonzero = fixed
  chrome_profile: "~/.resume-agent/chrome-profile"
  auto_launch: true      # auto-start Chrome via TS launcher if not running

# Optional Gemini feature
search_grounding:
  enabled: false

# Optional prompt cache for OpenAI-compatible providers
prompt_cache:
  enabled: false       # request-level prompt cache; currently ignored by Gemini
  retention: null      # optional provider-specific hint such as "24h"

# Session persistence
session:
  enabled: true
  sessions_dir: "./sessions"

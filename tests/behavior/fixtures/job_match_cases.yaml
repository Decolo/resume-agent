      jd_a: |
        Senior Backend Engineer (Remote US)

        Requirements:
        - 5+ years software engineering experience
        - Python backend development
        - AWS, Docker, Kubernetes
        - Build REST APIs
      jd_b: |
        Remote Staff Platform Developer (US timezone)

        Requirements:
        - At least five years building production software systems
        - Expert in Python services for server-side architecture
        - Operated cloud deployments on AWS with container orchestration
        - Designed HTTP service interfaces for internal and external consumers
